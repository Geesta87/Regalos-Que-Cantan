# Supabase project configuration
# Persists per-function settings so CLI deploys don't silently reset them.
#
# Background (2026-04-17): stripe-webhook and video-callback were accidentally
# redeployed WITHOUT --no-verify-jwt, causing Supabase to reject all incoming
# Stripe and Shotstack webhooks with 401 Unauthorized. 16+ customer payments
# were received by Stripe but never marked paid in the songs table because
# the webhook could not reach the handler.
#
# Any function below is invoked by an EXTERNAL service that cannot attach a
# Supabase JWT (Stripe, Shotstack, Kie.ai, useapi.net) or by pg_cron from
# inside Postgres. All of them must stay verify_jwt = false.
#
# To deploy from CLI use: supabase functions deploy <name> --project-ref yzbvajungshqcpusfiia
# (the CLI will read verify_jwt from this file — do NOT pass --no-verify-jwt anymore).

project_id = "yzbvajungshqcpusfiia"

# ---------------------------------------------------------------------------
# External webhook receivers — MUST be verify_jwt = false
# ---------------------------------------------------------------------------

[functions.stripe-webhook]
# Stripe sends webhooks with its own signature header (Stripe-Signature),
# validated inside the function against STRIPE_WEBHOOK_SECRET. Stripe cannot
# attach a Supabase JWT, so JWT verification must be OFF.
verify_jwt = false

[functions.video-callback]
# Shotstack render-completion webhook. No JWT available.
verify_jwt = false

[functions.mureka-useapi-callback]
# useapi.net webhook when a Mureka music job finishes. Validated internally
# via USEAPI_WEBHOOK_SECRET. No JWT available.
verify_jwt = false

[functions.song-callback]
# Kie.ai song-generation callback. No JWT available.
verify_jwt = false

[functions.social-clip-callback]
# Shotstack render-completion webhook for social clips. No JWT available.
verify_jwt = false

# ---------------------------------------------------------------------------
# pg_cron / internal schedulers — invoked from inside Postgres without a JWT
# ---------------------------------------------------------------------------

[functions.health-check]
# Runs every 10 minutes via pg_cron — no JWT context.
verify_jwt = false

[functions.poll-processing-songs]
# Runs every 2 minutes via pg_cron.
verify_jwt = false

[functions.send-scheduled-emails]
# Runs every 15 minutes via pg_cron — abandoned-cart + 30-min purchase reminders.
verify_jwt = false

[functions.recover-temp-videos]
# Cron-driven recovery job.
verify_jwt = false

[functions.poll-pending-videos]
# Runs every 2 minutes via pg_cron — safety net that triggers generate-video
# for video_orders whose customer uploaded photos but the browser never fired
# the render call (closed tab, network drop, etc).
verify_jwt = false

[functions.recover-mureka-cap-songs]
# One-shot recovery for the 2026-05-01 Mureka quota-cap outage. Re-submits failed
# songs through Kie.ai/Suno and emails the customer. Invoked from the admin/CLI
# (no user JWT) — must stay verify_jwt = false.
verify_jwt = false

[functions.preview-fathers-day-campaign]
# One-off preview sender for the Father's Day 2026 campaign. Sends all 11
# campaign emails (E0-E10) to a single hardcoded inbox so the visual + copy
# can be reviewed before the real campaign is configured. Invoked manually
# via curl — no user JWT context. Delete this function (and this block) once
# the real campaign is set up.
verify_jwt = false

# ---------------------------------------------------------------------------
# Internal generators invoked server-to-server from other edge functions
# ---------------------------------------------------------------------------

[functions.generate-video]
# Called from the SuccessPage frontend (anon key) AND server-to-server from
# poll-pending-videos (service-role key). No single consistent JWT context —
# the function validates videoOrder.paid internally instead.
verify_jwt = false

[functions.generate-song-mureka]
# Called server-to-server from generate-song with service-role context, not
# from a user session. Historically deployed with --no-verify-jwt.
verify_jwt = false

[functions.render-social-clip]
# Called server-to-server from stripe-webhook (and verify-payment fallback)
# the moment a song is marked paid. No user JWT context.
verify_jwt = false

[functions.post-to-ghl]
# Called server-to-server from social-clip-callback once the Shotstack render
# completes. No user JWT context.
verify_jwt = false

[functions.fetch-karaoke]
# Called server-to-server from stripe-webhook when a customer pays for the
# $7.99 karaoke add-on. Pulls the instrumental stem from useapi.net, extracts
# it from the returned ZIP, and uploads to Supabase Storage. No user JWT
# context — must stay verify_jwt = false.
verify_jwt = false

[functions.test-karaoke]
# Ops trigger that forwards a karaoke fetch request to the Vercel API route
# /api/karaoke-fetch, using the KARAOKE_TRIGGER_SECRET from Supabase env so
# operators don't have to paste secrets manually. Called via curl from
# admin/CLI — no user JWT.
verify_jwt = false

# ---------------------------------------------------------------------------
# Affiliate dashboard auth — uses an HMAC token in Authorization, NOT a
# Supabase JWT. The function verifies the token internally; the gateway
# must NOT try to verify it as a Supabase JWT or every call will 401.
# ---------------------------------------------------------------------------

[functions.affiliate-complete-onboarding]
# Frontend posts with `Authorization: Bearer <hmac-token>` from
# localStorage['rqc_affiliate_auth'].token. That token is signed with
# AFFILIATE_JWT_SECRET, not with Supabase's JWT secret, so the gateway
# can't verify it. Internal verifyToken() does the real check.
verify_jwt = false

[functions.affiliate-update-payout]
# Same HMAC-token pattern as affiliate-complete-onboarding — the partner's
# dashboard saves their Zelle / Venmo / PayPal / bank info here. Token is
# verified internally; the gateway must not try to verify it as a Supabase
# JWT or every call will 401.
verify_jwt = false

# ---------------------------------------------------------------------------
# Frontend-authenticated functions — verify_jwt = true (default, explicit)
# ---------------------------------------------------------------------------

[functions.admin-songs]
# Called from the admin dashboard with a logged-in Supabase Auth user's JWT.
# The platform gateway verifies the JWT before our handler runs; the handler
# then looks up the caller's role in admin_users to decide what to return.
verify_jwt = true

[functions.admin-affiliates]
# Admin-gated reader for affiliates / affiliate_events / affiliate_payouts.
# Same pattern as admin-songs: gateway validates the user JWT, handler
# requires a row in admin_users.
verify_jwt = true

[functions.create-affiliate]
# Admin-only writer that creates an affiliate, optional matching coupon, and
# emails credentials. Handler requires admin_users.role = 'admin'. Gateway
# verifies the JWT first so the role lookup runs against a real user.
verify_jwt = true

[functions.admin-record-payout]
# Admin-only writer that inserts a row into affiliate_payouts when the owner
# has sent money to a partner. Handler requires admin_users.role = 'admin'.
# Same pattern as create-affiliate — gateway verifies the user JWT, handler
# verifies the role.
verify_jwt = true

[functions.mureka-credits]
# Called from the admin dashboard with a logged-in Supabase Auth user's JWT.
# Reads + updates the manual Mureka credit anchor and computes the estimated
# remaining balance from songs.mureka_job_id counts.
verify_jwt = true

[functions.social-pipeline-config]
# Called from the admin dashboard with a logged-in Supabase Auth user's JWT.
# Reads + flips social_pipeline_state.enabled, the dashboard-controlled
# pause switch for render-social-clip + post-to-ghl.
verify_jwt = true

[functions.recover-song]
# Public-facing self-service song recovery, called from /mi-cancion with the
# Supabase anon key. Same auth pattern as create-checkout — verify_jwt = true
# means the gateway accepts the public anon JWT before our handler runs.
# The handler enforces its own per-IP rate limit and returns a same-shape
# response on every code path so the endpoint can't be used for email
# enumeration.
verify_jwt = true

# ---------------------------------------------------------------------------
# Clone Mi Voz (regalosquecantan.com/clonamivoz) — voice-cloning tier
# ---------------------------------------------------------------------------
# Standalone route added 2026-05-27 that lets a customer record their voice,
# get Claude-generated lyrics, and a Suno (via Kie.ai) song sung in THAT
# voice. Functions below all live behind verify_jwt = true and are called
# from the /clonamivoz frontend page with the public anon key. Each
# function validates its own inputs and writes to the dedicated
# voice_samples + cloned_voice_songs tables — completely isolated from
# public.songs and the regular Mureka funnel.

[functions.upload-customer-voice]
# Customer voice recording → Supabase Storage (private 'customer-voices'
# bucket) → public.voice_samples row → signed URL the frontend hands to
# the song generator. Frontend posts with the Supabase anon JWT, identical
# to recover-song's pattern.
verify_jwt = true

[functions.generate-cloned-voice-lyrics]
# Claude lyric generation for the Clone Mi Voz tier. LYRICS_TOOL and
# LYRICS_SYSTEM_PROMPT are copied verbatim from generate-song/index.ts
# (lines 1701-1787 as of 2026-05-27) — keep them in sync if production
# updates. Uses claude-sonnet-4-6 with claude-haiku-4-5-20251001 fallback,
# matching production retry order. Frontend posts with the Supabase anon
# JWT — same pattern as upload-customer-voice / recover-song.
verify_jwt = true
