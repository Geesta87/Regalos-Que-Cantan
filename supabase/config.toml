# the render into the `videos` bucket and marks the order completed, mirroring
# video-callback. Must stay verify_jwt = false.
verify_jwt = false

[functions.mureka-useapi-callback]
# useapi.net webhook when a Mureka music job finishes. Validated internally
# via USEAPI_WEBHOOK_SECRET. No JWT available.
verify_jwt = false

[functions.song-callback]
# Kie.ai song-generation callback. No JWT available.
verify_jwt = false

[functions.social-clip-callback]
# Shotstack render-completion webhook for social clips. No JWT available.
verify_jwt = false

[functions.twilio-sms-webhook]
# Inbound SMS receiver. Twilio POSTs here when a customer texts our A2P number;
# Twilio cannot attach a Supabase JWT, so verification must be OFF. The function
# authenticates instead via Twilio's X-Twilio-Signature (HMAC of url + params,
# keyed by TWILIO_AUTH_TOKEN) — gated by TWILIO_VALIDATE_SIGNATURE.
verify_jwt = false

[functions.whatsapp-webhook]
# Inbound WhatsApp receiver (Twilio). Twilio POSTs here when a customer messages
# our WhatsApp Business number; it cannot attach a Supabase JWT, so verification
# must be OFF. Authenticated via Twilio's X-Twilio-Signature, gated by
# TWILIO_VALIDATE_SIGNATURE — same pattern as twilio-sms-webhook.
verify_jwt = false

[functions.cs-agent]
# Customer-service AI brain. Called server-to-server by the inbound webhooks
# (twilio-sms-webhook / whatsapp-webhook) with the SERVICE-ROLE key as Bearer —
# no user JWT — so verify_jwt = false. The handler itself rejects any caller
# whose Bearer is not the service-role key. It DRAFTS replies only (never sends);
# its only DB access is SELECT on the read-only cs_customer_lookup view + insert
# of one draft into sms_messages. Reads ANTHROPIC_API_KEY.
verify_jwt = false

[functions.unsubscribe]
# Email unsubscribe handler. Hit by (a) Gmail/Yahoo/Apple one-click POST
# (RFC 8058), (b) the user clicking the List-Unsubscribe link (GET), and
# (c) admin manual suppression. None of those carry a Supabase JWT, so
# verification must be OFF. The public paths authenticate via an HMAC token
# (UNSUBSCRIBE_SECRET) bound to the email; the admin path requires a
# service-role JWT checked inside the handler.
verify_jwt = false

[functions.sendgrid-event-webhook]
# SendGrid Event Webhook receiver. SendGrid POSTs delivery events (bounce,
# spamreport, dropped, unsubscribe, group_unsubscribe) here; it cannot attach
# a Supabase JWT. Authenticated internally via SENDGRID_EVENT_TOKEN in the
# query string. Records hard opt-out events into email_unsubscribes.
verify_jwt = false

