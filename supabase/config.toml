# Supabase project configuration
# Persists per-function settings so CLI deploys don't silently reset them.
#
# Background (2026-04-17): stripe-webhook and video-callback were accidentally
# redeployed WITHOUT --no-verify-jwt, causing Supabase to reject all incoming
# Stripe and Shotstack webhooks with 401 Unauthorized. 16+ customer payments
# were received by Stripe but never marked paid in the songs table because
# the webhook could not reach the handler.
#
# Any function below is invoked by an EXTERNAL service that cannot attach a
# Supabase JWT (Stripe, Shotstack, Kie.ai, useapi.net) or by pg_cron from
# inside Postgres. All of them must stay verify_jwt = false.
#
# To deploy from CLI use: supabase functions deploy <name> --project-ref yzbvajungshqcpusfiia
# (the CLI will read verify_jwt from this file — do NOT pass --no-verify-jwt anymore).

project_id = "yzbvajungshqcpusfiia"

# ---------------------------------------------------------------------------
# External webhook receivers — MUST be verify_jwt = false
# ---------------------------------------------------------------------------

[functions.stripe-webhook]
# Stripe sends webhooks with its own signature header (Stripe-Signature),
# validated inside the function against STRIPE_WEBHOOK_SECRET. Stripe cannot
# attach a Supabase JWT, so JWT verification must be OFF.
verify_jwt = false

[functions.video-callback]
# Shotstack render-completion webhook. No JWT available.
verify_jwt = false

[functions.mureka-useapi-callback]
# useapi.net webhook when a Mureka music job finishes. Validated internally
# via USEAPI_WEBHOOK_SECRET. No JWT available.
verify_jwt = false

[functions.song-callback]
# Kie.ai song-generation callback. No JWT available.
verify_jwt = false

[functions.social-clip-callback]
# Shotstack render-completion webhook for social clips. No JWT available.
verify_jwt = false

# ---------------------------------------------------------------------------
# pg_cron / internal schedulers — invoked from inside Postgres without a JWT
# ---------------------------------------------------------------------------

[functions.health-check]
# Runs every 10 minutes via pg_cron — no JWT context.
verify_jwt = false

[functions.poll-processing-songs]
# Runs every 2 minutes via pg_cron.
verify_jwt = false

[functions.send-scheduled-emails]
# Runs every 15 minutes via pg_cron — abandoned-cart + 30-min purchase reminders.
verify_jwt = false

[functions.recover-temp-videos]
# Cron-driven recovery job.
verify_jwt = false

# ---------------------------------------------------------------------------
# Internal generators invoked server-to-server from other edge functions
# ---------------------------------------------------------------------------

[functions.generate-song-mureka]
# Called server-to-server from generate-song with service-role context, not
# from a user session. Historically deployed with --no-verify-jwt.
verify_jwt = false

[functions.render-social-clip]
# Called server-to-server from stripe-webhook (and verify-payment fallback)
# the moment a song is marked paid. No user JWT context.
verify_jwt = false

[functions.post-to-ghl]
# Called server-to-server from social-clip-callback once the Shotstack render
# completes. No user JWT context.
verify_jwt = false

# ---------------------------------------------------------------------------
# Affiliate dashboard auth — uses an HMAC token in Authorization, NOT a
# Supabase JWT. The function verifies the token internally; the gateway
# must NOT try to verify it as a Supabase JWT or every call will 401.
# ---------------------------------------------------------------------------

[functions.affiliate-complete-onboarding]
# Frontend posts with `Authorization: Bearer <hmac-token>` from
# localStorage['rqc_affiliate_auth'].token. That token is signed with
# AFFILIATE_JWT_SECRET, not with Supabase's JWT secret, so the gateway
# can't verify it. Internal verifyToken() does the real check.
verify_jwt = false

# ---------------------------------------------------------------------------
# Frontend-authenticated functions — verify_jwt = true (default, explicit)
# ---------------------------------------------------------------------------

[functions.admin-songs]
# Called from the admin dashboard with a logged-in Supabase Auth user's JWT.
# The platform gateway verifies the JWT before our handler runs; the handler
# then looks up the caller's role in admin_users to decide what to return.
verify_jwt = true

[functions.admin-affiliates]
# Admin-gated reader for affiliates / affiliate_events / affiliate_payouts.
# Same pattern as admin-songs: gateway validates the user JWT, handler
# requires a row in admin_users.
verify_jwt = true

[functions.create-affiliate]
# Admin-only writer that creates an affiliate, optional matching coupon, and
# emails credentials. Handler requires admin_users.role = 'admin'. Gateway
# verifies the JWT first so the role lookup runs against a real user.
verify_jwt = true

[functions.mureka-credits]
# Called from the admin dashboard with a logged-in Supabase Auth user's JWT.
# Reads + updates the manual Mureka credit anchor and computes the estimated
# remaining balance from songs.mureka_job_id counts.
verify_jwt = true

[functions.social-pipeline-config]
# Called from the admin dashboard with a logged-in Supabase Auth user's JWT.
# Reads + flips social_pipeline_state.enabled, the dashboard-controlled
# pause switch for render-social-clip + post-to-ghl.
verify_jwt = true
