# dashboard saves their Zelle / Venmo / PayPal / bank info here. Token is
# verified internally; the gateway must not try to verify it as a Supabase
# JWT or every call will 401.
verify_jwt = false

[functions.affiliate-request-reset]
# "Forgot password" — the login page posts an email with the Supabase anon
# key (the partner has no session yet). Same shape as affiliate-login: the
# gateway accepts the anon JWT, so verify_jwt stays at the default (true).
# Always returns generic success (no email enumeration) and emails a 1-hour
# signed reset link via SendGrid.
verify_jwt = true

[functions.affiliate-reset-password]
# Completes the reset from /afiliado/reset. Posts the emailed HMAC token + new
# password with the anon key (still no session). Gateway accepts the anon JWT
# (verify_jwt = true default); the real check is the internal token
# verification (must be purpose='pwreset' and unexpired).
verify_jwt = true

# ---------------------------------------------------------------------------
# Frontend-authenticated functions — verify_jwt = true (default, explicit)
# ---------------------------------------------------------------------------

[functions.admin-songs]
# Called from the admin dashboard with a logged-in Supabase Auth user's JWT.
# The platform gateway verifies the JWT before our handler runs; the handler
# then looks up the caller's role in admin_users to decide what to return.
verify_jwt = true

[functions.sms-admin]
# Called from the admin dashboard "Mensajes SMS" tab with a logged-in Supabase
# Auth user's JWT. Same pattern as admin-songs: gateway verifies the JWT, the
# handler requires a row in admin_users. Lists SMS conversations and sends
# replies (via _shared/send-sms.ts → Twilio). Both 'admin' and 'assistant' may
# use it — no revenue fields are exposed.
verify_jwt = true

[functions.admin-affiliates]
# Admin-gated reader for affiliates / affiliate_events / affiliate_payouts.
# Same pattern as admin-songs: gateway validates the user JWT, handler
# requires a row in admin_users.
verify_jwt = true

[functions.create-affiliate]
# Admin-only writer that creates an affiliate, optional matching coupon, and
# emails credentials. Handler requires admin_users.role = 'admin'. Gateway
# verifies the JWT first so the role lookup runs against a real user.
verify_jwt = true

[functions.admin-record-payout]
# Admin-only writer that inserts a row into affiliate_payouts when the owner
# has sent money to a partner. Handler requires admin_users.role = 'admin'.
# Same pattern as create-affiliate — gateway verifies the user JWT, handler
# verifies the role.
verify_jwt = true

[functions.delete-affiliate]
# Admin-only writer that deactivates or hard-deletes an affiliate (plus their
# events, payouts, and coupon). Handler requires admin_users.role = 'admin'.
# Same pattern as admin-record-payout — gateway verifies the user JWT, handler
# verifies the role. Hard delete refuses when payouts exist unless force:true.
verify_jwt = true

[functions.mureka-credits]
# Called from the admin dashboard with a logged-in Supabase Auth user's JWT.
# Reads + updates the manual Mureka credit anchor and computes the estimated
# remaining balance from songs.mureka_job_id counts.
verify_jwt = true

[functions.social-pipeline-config]
# Called from the admin dashboard with a logged-in Supabase Auth user's JWT.
# Reads + flips social_pipeline_state.enabled, the dashboard-controlled
# pause switch for render-social-clip + post-to-ghl.
verify_jwt = true

[functions.recover-song]
# Public-facing self-service song recovery, called from /mi-cancion with the
# Supabase anon key. Same auth pattern as create-checkout — verify_jwt = true
# means the gateway accepts the public anon JWT before our handler runs.
# The handler enforces its own per-IP rate limit and returns a same-shape
# response on every code path so the endpoint can't be used for email
# enumeration.
verify_jwt = true

[functions.create-gift-checkout]
# Creates the $5 Stripe session for the "send this song as a scheduled surprise
# text" add-on. Called from the SuccessPage gift modal with the Supabase anon
# JWT (same pattern as recover-song / create-clonamivoz-checkout), so the
# gateway accepts the anon JWT before the handler runs — verify_jwt = true.
# The handler runs a Claude moderation pass on the buyer's message BEFORE
# creating any row or Stripe session, then tags metadata.type='gift_sms' so
# stripe-webhook routes the payment to the gift row, not the song.
verify_jwt = true

[functions.charge-upsell]
# Post-purchase ONE-TAP secondary upsell charge (Animado / instrumental). Called
# from the SuccessPage with the Supabase anon JWT (same pattern as
# create-gift-checkout / recover-song), so the gateway accepts the anon JWT →
# verify_jwt = true. The handler authorizes the caller by requiring the original
# checkout session_id to MATCH the song's stripe_session_id (proof of purchase),
# then charges the saved card off-session via Stripe PaymentIntents and fulfills
# by reusing create-story-video-order / the Vercel karaoke worker. It NEVER
# touches stripe-webhook or the $29.99 funnel — fully isolated, like the
# clonamivoz functions.
verify_jwt = true

# ---------------------------------------------------------------------------
# Clone Mi Voz (regalosquecantan.com/clonamivoz) — voice-cloning tier
# ---------------------------------------------------------------------------
# Standalone route added 2026-05-27 that lets a customer record their voice,
# get Claude-generated lyrics, and a Suno (via Kie.ai) song sung in THAT
# voice. Functions below all live behind verify_jwt = true and are called
# from the /clonamivoz frontend page with the public anon key. Each
# function validates its own inputs and writes to the dedicated
# voice_samples + cloned_voice_songs tables — completely isolated from
# public.songs and the regular Mureka funnel.

[functions.upload-customer-voice]
# Customer voice recording → Supabase Storage (private 'customer-voices'
# bucket) → public.voice_samples row → signed URL the frontend hands to
# the song generator. Frontend posts with the Supabase anon JWT, identical
# to recover-song's pattern.
verify_jwt = true

[functions.generate-cloned-voice-lyrics]
# Claude lyric generation for the Clone Mi Voz tier. LYRICS_TOOL and
# LYRICS_SYSTEM_PROMPT are copied verbatim from generate-song/index.ts
# (lines 1701-1787 as of 2026-05-27) — keep them in sync if production
# updates. Uses claude-sonnet-4-6 with claude-haiku-4-5-20251001 fallback,
# matching production retry order. Frontend posts with the Supabase anon
# JWT — same pattern as upload-customer-voice / recover-song.
verify_jwt = true

[functions.generate-cloned-voice-song]
# Suno (via Kie.ai) song generation for the Clone Mi Voz tier. Calls the
# /api/v1/generate/upload-cover endpoint with the customer's voice URL +
# Claude-generated lyrics + a per-genre style string. Voice-fidelity tuning
# (styleWeight=0.35, audioWeight=0.85, weirdnessConstraint=0.2, negativeTags
# against autotune/vocoder) is the result of the suno-voice-clone-test
# harness's 6-genre validation pass — DO NOT loosen those values without
# re-running the test.
#
# verify_jwt = false because this function is ONLY invoked server-to-server:
#   - clonamivoz-stripe-webhook (real $69 paid path)
#   - clonamivoz-test-bypass-payment (testing-mode bypass)
# Neither caller can attach a Supabase user JWT — they use the
# SUPABASE_SERVICE_ROLE_KEY as a Bearer token, which the Functions gateway
# rejects with UNAUTHORIZED_INVALID_JWT_FORMAT when verify_jwt is true.
# Flipped to false on 2026-05-28 after hitting that exact 401 from the
# bypass path. CLAUDE.md §3.2 covers this rule: "Called by another edge
# function with service-role context → verify_jwt = false."
# Returns { cloned_voice_song_id, kie_task_id, status } — cloned-voice-status
# is the polling endpoint that surfaces the finished audio URLs.
verify_jwt = false

[functions.cloned-voice-status]
# Polling endpoint for the Clone Mi Voz tier. Frontend calls this every
# ~5s while the song is in 'generating_song' status. Hits Kie
# /api/v1/generate/record-info, maps Kie's status enum to our
# cloned_voice_songs.status, persists audio URLs on SUCCESS or error on
# failure modes, and returns the current state. Frontend posts with the
# Supabase anon JWT — same pattern as the other Clone Mi Voz functions.
# We poll instead of relying on Kie's callback because the configured
# KIE_CALLBACK_URL is a webhook.site sink we never read (validated by
# suno-voice-clone-test prototype).
verify_jwt = true

[functions.generate-cloned-voice-preview]
# Generates a 30-60s voice-cloned PREVIEW for the Clone Mi Voz tier
# BEFORE the customer is asked to pay $69. Same Kie/Suno upload-cover
# endpoint + voice-fidelity tuning as generate-cloned-voice-song, but
# with a hardcoded 4-line preview lyric instead of the full Claude
# output. The preview closes the trust gap ("will it really sound like
# me?") and dramatically lifts conversion. Frontend posts with the
# Supabase anon JWT.
verify_jwt = true

[functions.create-clonamivoz-checkout]
# Stripe checkout session creation for the Clone Mi Voz $69 tier.
# Separate from the main create-checkout (which handles the regular
# $29.99 funnel with coupons / video addons / affiliate attribution).
# Inline price_data — no Stripe Product needs to exist beforehand.
# Metadata carries cloned_voice_song_id back to clonamivoz-stripe-webhook.
# Frontend posts with the Supabase anon JWT after the preview is ready.
verify_jwt = true

[functions.diagnose-voice-clone]
# One-off diagnostic tool for voice-clone quality complaints. Given a
# voice_sample_id, fires 6 Kie generations in parallel with different
# param combinations (V5_5 vs V4_5, audioWeight 0.95 vs 1.0, with/without
# genre style, with/without explicit vocalGender). Returns 6 task IDs;
# operator polls Kie record-info to collect 12 audio variants and blind-
# listens to pick which combo clones best. Burns ~$0.60 of Kie credits
# per run. NOT in the customer flow.
verify_jwt = true

[functions.admin-cloned-voice-songs]
# Admin-dashboard reader for the Clone Mi Voz tier. Mirrors admin-songs's
# auth pattern (Supabase Auth JWT + admin_users.role lookup) but reads
# from public.cloned_voice_songs instead of public.songs. Kept separate
# so admin-songs/index.ts isn't modified. 'admin' sees revenue fields,
# 'assistant' sees them wiped.
verify_jwt = true

[functions.find-customer-voices]
# Returning-customer voice lookup. Given an email, returns previously-
# uploaded voice samples so the customer can skip re-recording. Per-IP
# rate-limited (20 lookups / minute) to slow down email scraping.
# Frontend posts with the Supabase anon JWT — same pattern as the other
# clonamivoz functions.
verify_jwt = true

[functions.clonamivoz-stripe-webhook]
# Stripe webhook for the Clone Mi Voz tier ONLY. Separate from the main
# stripe-webhook so an issue here can't break the $29.99 funnel (see
# CLAUDE.md §2 outage history). Different Stripe webhook endpoint,
# different signing secret (STRIPE_CLONAMIVOZ_WEBHOOK_SECRET).
#
# Uses constructEventAsync (sync constructEvent throws in Deno — see
# CLAUDE.md §3.1). On checkout.session.completed, marks the row paid
# and server-to-server calls generate-cloned-voice-song to start the
# full Suno generation with the customer's actual lyrics.
#
# verify_jwt = false because Stripe can't attach a Supabase JWT.
# Signature is verified internally via the webhook signing secret.
verify_jwt = false

[functions.clonamivoz-test-bypass-payment]
# TEMPORARY testing-only endpoint added 2026-05-28 so the team can run
# the /clonamivoz flow end-to-end without paying $69 every time.
# Mirrors clonamivoz-stripe-webhook minus Stripe: marks the row paid,
# server-to-server calls generate-cloned-voice-song. Gated by the
# Supabase secret CLONAMIVOZ_BYPASS_ENABLED — set to 'true' to enable,
# unset to immediately re-lock the paywall (function returns 403).
# Frontend posts with the Supabase anon JWT (same as the other
# clonamivoz functions); the env gate is what actually protects it.
# Remove this function (and this block, and the Supabase secret) once
# voice-cloning quality is validated and the paid tier launches.
verify_jwt = true
