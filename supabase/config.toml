# Supabase project configuration
# Persists per-function settings so CLI deploys don't silently reset them.
#
# Background (2026-04-17): stripe-webhook and video-callback were accidentally
# redeployed WITHOUT --no-verify-jwt, causing Supabase to reject all incoming
# Stripe and Shotstack webhooks with 401 Unauthorized. 16+ customer payments
# were received by Stripe but never marked paid in the songs table because
# the webhook could not reach the handler.
#
# Any function below is invoked by an EXTERNAL service that cannot attach a
# Supabase JWT (Stripe, Shotstack, Kie.ai, useapi.net) or by pg_cron from
# inside Postgres. All of them must stay verify_jwt = false.
#
# To deploy from CLI use: supabase functions deploy <name> --project-ref yzbvajungshqcpusfiia
# (the CLI will read verify_jwt from this file — do NOT pass --no-verify-jwt anymore).

project_id = "yzbvajungshqcpusfiia"

# ---------------------------------------------------------------------------
# External webhook receivers — MUST be verify_jwt = false
# ---------------------------------------------------------------------------

[functions.stripe-webhook]
# Stripe sends webhooks with its own signature header (Stripe-Signature),
# validated inside the function against STRIPE_WEBHOOK_SECRET. Stripe cannot
# attach a Supabase JWT, so JWT verification must be OFF.
verify_jwt = false

[functions.video-callback]
# Shotstack render-completion webhook. No JWT available.
verify_jwt = false

[functions.transcribe-song]
# Word-level Whisper transcription helper for the story-video / lyric-video
# pipeline. Called manually / server-to-server (no Supabase JWT); reads
# OPENAI_API_KEY + service-role key from its own env. Must stay verify_jwt = false.
verify_jwt = false

[functions.test-kie-video]
# Throwaway TEST harness evaluating Kie.ai's unified video API (Seedance 2.0)
# as a cheaper/faster alternative to Higgsfield for the story-video upsell.
# Curl'd server-to-server during testing (no Supabase JWT); reads KIE_API_KEY
# from its own env. verify_jwt = false so the test calls don't need a token.
verify_jwt = false

[functions.test-gpt-image]
# Throwaway TEST harness for GPT Image 2 with REFERENCE images (OpenAI images/edits)
# to compare the ad's GPT Image 2 + Seedance 2.0 stack against nano-banana for the
# Animado story-video. Curl'd server-to-server during testing; reads OPENAI_API_KEY.
verify_jwt = false

[functions.generate-storyboard]
# Auto-storyboard "brain" for the animated story-video pipeline. Given a songId,
# reads details+lyrics+lyrics_timestamps and asks Claude (ANTHROPIC_API_KEY) to
# emit the structured scene plan. Called server-to-server by the orchestrator /
# admin (no Supabase JWT). Must stay verify_jwt = false.
verify_jwt = false

[functions.generate-likeness]
# Story-video pipeline STAGE 1: creates a story_video_orders row and generates 2
# Pixar-cartoon likeness options of the recipient via Kie (nano-banana-edit), then
# parks it in 'likeness_review' for the admin approval tab. Server-to-server
# (no Supabase JWT); reads KIE_API_KEY + service-role from env. Must stay verify_jwt = false.
verify_jwt = false

[functions.approve-likeness]
# Story-video ADMIN GATE 1 exit: admin picks one of the 2 likeness options (or rejects).
# Sets approved_character_url + state='building'. Admin/server call (no Supabase JWT).
# Must stay verify_jwt = false.
verify_jwt = false

[functions.story-build-context]
# Feeds the auto-build engine everything from one order id (config, storyboard, timing,
# audio) so the engine needs no DB secrets. Ensures storyboard exists. Server-to-server
# (no Supabase JWT); reads service-role from env. Must stay verify_jwt = false.
verify_jwt = false

[functions.story-build-finalize]
# Engine hands the finished video back: signed upload-url -> complete (sets video_url +
# state='final_review', GATE 2) / fail. Server-to-server (no Supabase JWT); service-role
# from env. Must stay verify_jwt = false.
verify_jwt = false

[functions.admin-story-videos]
# Powers the admin "Needs Approval" tab (likeness pick + final approve/reject). Called by
# the dashboard with the logged-in admin's JWT and verifies admin_users membership, so
# verify_jwt = true (default) — do NOT set false here (unlike the server-to-server fns).
verify_jwt = true

[functions.admin-videos]
# Powers the admin "Videos" tab ($9.99 slideshow): list paid videos + links, surface
# failed/stuck ones, search by customer, retry a problem video. Admin JWT + admin_users
# check (like admin-story-videos), so verify_jwt = true.
verify_jwt = true

[functions.deliver-story-video]
# Pipeline EXIT: emails the customer their finished animated story video via SendGrid +
# marks delivered. Called by admin-story-videos.approve_final (server-to-server, no
# Supabase JWT); reads SENDGRID_API_KEY + service-role from env. Must stay verify_jwt = false.
verify_jwt = false

[functions.create-story-video-order]
